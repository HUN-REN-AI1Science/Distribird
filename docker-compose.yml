services:
  ui:
    build: .
    command: streamlit run src/distribird/ui/app.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      - DISTRIBIRD_AUTH_USERNAME=${DISTRIBIRD_AUTH_USERNAME:-demo}
      - DISTRIBIRD_AUTH_PASSWORD=${DISTRIBIRD_AUTH_PASSWORD:-distribird2026}
    restart: unless-stopped

  api:
    build: .
    command: uvicorn distribird.api.routes:app --host 0.0.0.0 --port 8000
    ports:
      - "8002:8000"
    env_file: .env
    environment:
      - DISTRIBIRD_AUTH_USERNAME=${DISTRIBIRD_AUTH_USERNAME:-demo}
      - DISTRIBIRD_AUTH_PASSWORD=${DISTRIBIRD_AUTH_PASSWORD:-distribird2026}
    restart: unless-stopped
