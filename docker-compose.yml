services:
  ui:
    build: .
    command: streamlit run src/litopri/ui/app.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      - LITOPRI_AUTH_USERNAME=${LITOPRI_AUTH_USERNAME:-demo}
      - LITOPRI_AUTH_PASSWORD=${LITOPRI_AUTH_PASSWORD:-litopri2026}
    restart: unless-stopped

  api:
    build: .
    command: uvicorn litopri.api.routes:app --host 0.0.0.0 --port 8000
    ports:
      - "8002:8000"
    env_file: .env
    environment:
      - LITOPRI_AUTH_USERNAME=${LITOPRI_AUTH_USERNAME:-demo}
      - LITOPRI_AUTH_PASSWORD=${LITOPRI_AUTH_PASSWORD:-litopri2026}
    restart: unless-stopped
